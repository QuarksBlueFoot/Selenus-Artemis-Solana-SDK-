name: Publish to Maven Central & NPM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 2.0.0)'
        required: true
        type: string

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ─── Release gate ──────────────────────────────────────────────────────
  # Every publish must pass the same conformance surface CI runs on PRs:
  # the full unit-test sweep, MWA walletlib-2.0 behavior tests, Seed Vault
  # contract/provider tests, compat parity tests, and the committed API-
  # surface diff. Maven + NPM publishes are blocked until this job goes
  # green — "release-readiness" is evidence-backed, not a human judgment
  # call. See docs/RELEASE_READINESS.md for the full checklist.
  release-gate:
    name: Release-readiness gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
      - uses: android-actions/setup-android@v3
      - name: Install Android platforms
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
      - name: Assemble debug
        run: ./gradlew --no-daemon assembleDebug
      - name: Core unit tests
        run: |
          ./gradlew --no-daemon \
            :artemis-tx:jvmTest \
            :artemis-vtx:jvmTest \
            :artemis-programs:jvmTest \
            :artemis-rpc:jvmTest \
            :artemis-ws:jvmTest \
            :artemis-wallet:jvmTest \
            :artemis-wallet-mwa-android:testDebugUnitTest \
            :artemis-seed-vault:testDebugUnitTest
      - name: MWA walletlib 2.0 behavior gate
        run: ./gradlew --no-daemon :artemis-wallet-mwa-android:testDebugUnitTest --tests '*BehaviorTest*'
      - name: Client SDK compat runtime parity gate
        run: |
          ./gradlew --no-daemon \
            :artemis-mwa-common-compat:testDebugUnitTest \
            :artemis-mwa-clientlib-compat:testDebugUnitTest \
            :artemis-mwa-walletlib-compat:testDebugUnitTest \
            :artemis-mwa-compat:testDebugUnitTest \
            :artemis-seedvault-compat:testDebugUnitTest \
            :artemis-web3-solana-compat:jvmTest \
            :artemis-rpc-core-compat:jvmTest \
            :artemis-sol4k-compat:jvmTest \
            :artemis-solana-kmp-compat:jvmTest \
            :artemis-metaplex-android-compat:jvmTest
      - name: Compat API surface diff gate
        run: |
          ./gradlew --no-daemon dumpApi
          if ! git diff --exit-code -- 'interop/*/api/*.api'; then
            echo "::error::Compat API surface drifted. Regenerate and commit snapshots before releasing."
            git --no-pager diff -- 'interop/*/api/*.api'
            exit 1
          fi
      - name: Dependency ring enforcement
        run: ./gradlew --no-daemon checkDependencyRings

  publish-maven:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: release-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Configure Maven Central credentials
        run: |
          echo "CENTRAL_USERNAME=${{ secrets.OSSRH_USERNAME }}" >> local.properties
          echo "CENTRAL_PASSWORD=${{ secrets.OSSRH_PASSWORD }}" >> local.properties
          echo "signing.keyId=${{ secrets.GPG_KEY_ID }}" >> local.properties
          echo "signing.password=${{ secrets.GPG_PASSPHRASE }}" >> local.properties

      - name: Build and Publish to Maven Central
        run: |
          ./gradlew publish -x javaDocReleaseGeneration \
            --no-daemon \
            -PCENTRAL_USERNAME="${{ secrets.OSSRH_USERNAME }}" \
            -PCENTRAL_PASSWORD="${{ secrets.OSSRH_PASSWORD }}" \
            -Psigning.keyId=${{ secrets.GPG_KEY_ID }} \
            -Psigning.password=${{ secrets.GPG_PASSPHRASE }}
        env:
          SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          SIGNING_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
          CENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

      - name: Trigger Portal Upload
        run: |
          # Trigger upload to Central Portal with automatic release
          AUTH=$(echo -n "${{ secrets.OSSRH_USERNAME }}:${{ secrets.OSSRH_PASSWORD }}" | base64 -w 0)
          curl -X POST \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/xyz.selenus?publishing_type=automatic" \
            -H "Authorization: Bearer $AUTH" \
            -H "Content-Type: application/json" \
            --fail-with-body || echo "Portal upload triggered (may need manual release)"

      - name: Summary
        run: |
          echo "## 📦 Maven Central Publication" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published **xyz.selenus:artemis-*:${{ github.event.release.tag_name || inputs.version }}** to Maven Central." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check status at [Central Portal](https://central.sonatype.com/publishing/deployments)" >> $GITHUB_STEP_SUMMARY

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: publish-maven
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        working-directory: advanced/artemis-react-native
        run: |
          npm ci
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## 📦 NPM Publication" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published **@selenus/artemis-solana-sdk@${{ github.event.release.tag_name || inputs.version }}** to NPM." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with: \`npm install @selenus/artemis-solana-sdk\`" >> $GITHUB_STEP_SUMMARY
