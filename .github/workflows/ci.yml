name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

      - name: Assemble debug
        run: ./gradlew --no-daemon assembleDebug

      - name: Unit tests (foundation + wallet + MWA + Seed Vault)
        run: |
          ./gradlew --no-daemon \
            :artemis-rpc:jvmTest \
            :artemis-ws:jvmTest \
            :artemis-wallet:jvmTest \
            :artemis-wallet-mwa-android:testDebugUnitTest \
            :artemis-seed-vault:testDebugUnitTest

      - name: Dependency ring enforcement
        run: ./gradlew --no-daemon checkDependencyRings

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            mobile/**/build/reports/tests/**
            foundation/**/build/reports/tests/**
            interop/**/build/reports/tests/**

  mwa-behavior:
    name: MWA behavior conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-mwa-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
      - uses: android-actions/setup-android@v3
      - name: Install Android platforms
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
      - name: MWA walletlib 2.0 behavior tests
        # Runs the `*BehaviorTest` suite in the MWA module. These drive a
        # fake MwaClient through every walletlib-2.0-sensitive flow
        # (authorize + addresses/features/SIWS, clone_authorization,
        # getCapabilities, signAndSendTransactions, reauthorize, session
        # expiry). Primitive crypto tests continue to run in the main
        # build job; this gate specifically guards the protocol surface.
        run: ./gradlew --no-daemon :artemis-wallet-mwa-android:testDebugUnitTest --tests '*BehaviorTest*'
      - name: Upload MWA report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mwa-behavior-report
          path: mobile/artemis-wallet-mwa-android/build/reports/tests/**

  seed-vault-conformance:
    name: Seed Vault conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-sv-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
      - uses: android-actions/setup-android@v3
      - name: Install Android platforms
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
      - name: Seed Vault unit + contract/provider tests
        run: ./gradlew --no-daemon :artemis-seed-vault:testDebugUnitTest
      - name: Upload Seed Vault report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: seed-vault-report
          path: mobile/artemis-seed-vault/build/reports/tests/**

  compat-parity:
    name: MWA compat parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-compat-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
      - uses: android-actions/setup-android@v3
      - name: Install Android platforms
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
      - name: Compat runtime parity tests
        run: |
          ./gradlew --no-daemon \
            :artemis-mwa-clientlib-compat:testDebugUnitTest \
            :artemis-mwa-compat:testDebugUnitTest
      - name: Upload compat parity report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compat-parity-report
          path: interop/artemis-mwa-clientlib-compat/build/reports/tests/**

  api-surface-gate:
    name: Compat API surface gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-api-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
      - uses: android-actions/setup-android@v3
      - name: Install Android platforms
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
      - name: Regenerate compat API snapshots
        run: ./gradlew --no-daemon dumpApi
      - name: Diff against committed snapshots
        # Fails CI when the current compat public surface drifts from the
        # committed .api files. Intentional changes must update the
        # snapshots in the same PR (run `./gradlew dumpApi` locally).
        run: |
          if ! git diff --exit-code -- 'interop/*/api/*.api'; then
            echo "::error::Compat API surface drifted. Run './gradlew dumpApi' and commit the updated .api files if the change is intentional."
            git --no-pager diff -- 'interop/*/api/*.api'
            exit 1
          fi
      - name: Sanity-check the snapshot rebuild matches via verifyApiSnapshots
        # Belt-and-braces: verifyApiSnapshots rebuilds in-memory and
        # compares to the committed snapshot. Catches the (rare) case
        # where dumpApi succeeded but the rebuild from source disagrees.
        run: ./gradlew --no-daemon verifyApiSnapshots
      - name: Print upstream-version pins
        # Surfaces the upstream version each compat module targets so PR
        # reviewers can see whether the snapshot bump matches a declared
        # upstream release. The grep is best-effort — modules pin via
        # `extra["upstream.version"] = "..."` per PARITY_MATRIX policy.
        run: |
          echo "## Upstream pins per compat module" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for f in interop/*/build.gradle.kts; do
            module=$(basename "$(dirname "$f")")
            version=$(grep -E '^extra\["upstream.version"\]' "$f" | sed -E 's/.*= *"([^"]+)".*/\1/' || true)
            artifact=$(grep -E '^extra\["upstream.artifact"\]' "$f" | sed -E 's/.*= *"([^"]+)".*/\1/' || true)
            if [ -n "$version" ]; then
              echo "- **$module** → \`$artifact:$version\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  lint:
    name: Lint + compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install Android platforms
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
      - name: Kotlin compile check
        run: ./gradlew --no-daemon compileDebugKotlin || ./gradlew --no-daemon compileKotlinJvm
